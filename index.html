<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK PACKERS AND MOVERS - Document Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="controls no-print">
        <h1>ARK <span>PACKERS & MOVERS</span> — OFFLINE TOOLS</h1>
        <div class="nav-buttons">
            <button onclick="switchTemplate('quotation')"> Quotation</button>
            <button onclick="switchTemplate('invoice')">Tax Invoice</button>
            <button onclick="switchTemplate('itemlist')"> Item List</button>
            <button onclick="switchTemplate('receipt')"> Receipt</button>
            <button class="print-btn" onclick="printDocument()"> Print / Save PDF</button>
            <button class="reset-btn" onclick="resetForm()"> Reset</button>
            <button class="export-btn" onclick="exportData()"> Export Backup</button>
            <button class="import-btn" onclick="triggerImport()"> Import Backup</button>
            <button onclick="toggleDarkMode()"> Dark Mode</button>
        </div>
    </div>

    <div class="page-container" id="document-container">
        <div class="border-box">
            <!-- Header (Common to all docs) -->
            <table class="header-table">
                <tr>
                    <td class="logo-cell">
                        <img src="assets/ARK Packers And Movers Wordmark Logo 2.png" alt="ARK LOGO" id="company-logo">
                    </td>
                    <td class="company-details-cell">
                        <div class="company-name"> ARK PACKERS AND MOVERS </div>
                        <div class="company-address">60/12 Nanbargal Street, S.S.Colony, Madurai - 625016</div>
                        <div class="company-contact">
                            📞 +91 9843412811 &nbsp;|&nbsp; ✉️ arkpackersmovers@gmail.com
                        </div>
                    </td>
                </tr>
            </table>
            <div class="header-accent-bar"></div>

            <!-- Dynamic Template Content Goes Here -->
            <div id="template-content" class="template-section">
                <!-- Quotation will be default -->
            </div>
        </div>
    </div>

</body>
<script src="script.js"></script>

</html>
